name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Astro site
        run: npm run build
        
      - name: Debug - List dist contents
        run: |
          echo "Contents of dist folder:"
          ls -la dist/
          echo "Looking for sitemaps:"
          find dist/ -name "*sitemap*" -type f
          
      - name: Debug - Check sitemap content
        run: |
          if [ -f "dist/sitemap-index.xml" ]; then
            echo "sitemap-index.xml exists:"
            head -10 dist/sitemap-index.xml
          else
            echo "sitemap-index.xml NOT found"
          fi
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
